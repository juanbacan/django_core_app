<script>
    function refreshInlineAddButton(prefix) {
        var addButton = document.getElementById("add-inline-" + prefix);
        var totalFormsInput = document.querySelector("input[name='" + prefix + "-TOTAL_FORMS']");
        var maxFormsInput = document.querySelector("input[name='" + prefix + "-MAX_NUM_FORMS']");
        if (!addButton || !totalFormsInput || !maxFormsInput) {
            return;
        }

        var total = parseInt(totalFormsInput.value, 10);
        var max = parseInt(maxFormsInput.value, 10);
        var canAdd = Number.isNaN(max) || max <= 0 || max === 1000 || total < max;

        addButton.style.display = canAdd ? "" : "none";
        addButton.disabled = !canAdd;
    }

    // Función para eliminar un inline
    function removeInline(button) {
        var inlineDiv = button.closest('.inline-form');

        // Eliminar los editores de texto solo si TinyMCE está disponible
        if (typeof tinymce !== 'undefined') {
            var textareas = inlineDiv.querySelectorAll("textarea");
            textareas.forEach(function(textarea) {
                if (tinymce.get(textarea.id)) {
                    tinymce.EditorManager.execCommand('mceRemoveEditor', true, textarea.id);
                }
            });
        }

        if (inlineDiv) {
            inlineDiv.remove();
        }
        // Obtener el prefijo del formset
        var formsetPrefix = inlineDiv.id.split("-")[0];
        // Actualizar el total de formularios
        var totalFormsInput = document.querySelector("input[name$='" + formsetPrefix + "-TOTAL_FORMS']");
        totalFormsInput.value = parseInt(totalFormsInput.value, 10) - 1;

        var inlineItemsContainer = document.querySelector("[data-inline-items='" + formsetPrefix + "']");
        if (!inlineItemsContainer) {
            refreshInlineAddButton(formsetPrefix);
            return;
        }
        
        // Actualizar los índices de los formularios restantes
        var formIndex = 0;
        var formRows = inlineItemsContainer.querySelectorAll(".inline-form");
        formRows.forEach(function(row) {
            var inputs = row.querySelectorAll("input, select, textarea");
            inputs.forEach(function(input) {
                var inputName = input.name;
                var newInputName = inputName.replace(/-\d+-/g, "-" + formIndex + "-");
                input.name = newInputName;
                if (input.id) {
                    input.id = "id_" + newInputName.replace(/-/g, "_");
                }
            });
            row.id = formsetPrefix + "-" + formIndex;
            formIndex++;
        });

        refreshInlineAddButton(formsetPrefix);
    }

    function initInlineFormset(prefix) {
        let addButton = document.getElementById("add-inline-" + prefix);
        if (!addButton) {
            return;
        }

        let totalFormsInput = document.querySelector("input[name='" + prefix + "-TOTAL_FORMS']");
        let maxFormsInput = document.querySelector("input[name='" + prefix + "-MAX_NUM_FORMS']");
        let emptyInlineDiv = document.getElementById("empty-inline-" + prefix);
        let inlineItemsContainer = document.querySelector("[data-inline-items='" + prefix + "']");
        if (!totalFormsInput || !emptyInlineDiv) {
            return;
        }
        if (!inlineItemsContainer) {
            return;
        }
    
        let emptyFormHtml = emptyInlineDiv.querySelector(".inline-form").outerHTML;

        refreshInlineAddButton(prefix);
    
        addButton.addEventListener("click", function() {
            let formCount = parseInt(totalFormsInput.value, 10);
            let maxCount = maxFormsInput ? parseInt(maxFormsInput.value, 10) : NaN;
            if (!Number.isNaN(maxCount) && maxCount > 0 && maxCount !== 1000 && formCount >= maxCount) {
                refreshInlineAddButton(prefix);
                return;
            }

            let newFormHtml = emptyFormHtml.replace(/__prefix__/g, formCount);
            let template = document.createElement("template");
            template.innerHTML = newFormHtml.trim();
            let newRow = template.content.firstElementChild;
    
            inlineItemsContainer.appendChild(newRow);
            totalFormsInput.value = formCount + 1;
    
            // Inicializar tinymce solo si está disponible
            if (typeof tinymce !== 'undefined') {
                let newTextareas = newRow.querySelectorAll("textarea");
                newTextareas.forEach(function(textarea) {
                    if (!textarea.id) {
                        textarea.id = "id_" + textarea.name.replace(/-/g, "_") + "_" + formCount;
                    }
                    if (!tinymce.get(textarea.id)) {
                        tinymce.EditorManager.execCommand('mceAddEditor', true, textarea.id);
                    }
                });
            }

            refreshInlineAddButton(prefix);
        });
    }
    
    // Función para inicializar todos los formsets
    function initAllInlineFormsets() {
        {% for formset in form.inline_formsets %}
            initInlineFormset("{{ formset.prefix }}");
        {% endfor %}
    }
    
    // Inicializar en DOMContentLoaded (para páginas normales)
    if (document.readyState === 'loading') {
        document.addEventListener("DOMContentLoaded", initAllInlineFormsets);
    } else {
        // Si el DOM ya está cargado (modales), ejecutar inmediatamente
        initAllInlineFormsets();
    }
</script>
